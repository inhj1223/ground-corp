<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ground Corporation | 시흥 본점</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
      :root {
        --brand-green: #2d6a4f;
        --point-green: #52b788;
        --mint-light: #d8f3dc;
        --deep-black: #1b4332;
        --pure-white: #ffffff;
        --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background: var(--pure-white);
        color: var(--deep-black);
        line-height: 1.6;
        word-break: keep-all; /* 한글 줄바꿈 자연스럽게 */
        overflow-x: hidden;
      }

      /* --- Header --- */
      header {
        position: fixed;
        top: 0;
        width: 100%;
        height: 70px; /* 모바일 대응 높이 축소 */
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 5%;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--mint-light);
      }
      .logo-img {
        height: 35px; /* 모바일 로고 크기 최적화 */
      }

      /* --- Branch Hero --- */
      .branch-hero {
        height: 60vh; /* 모바일에서 너무 길지 않게 */
        min-height: 400px;
        background:
          linear-gradient(rgba(45, 106, 79, 0.7), rgba(45, 106, 79, 0.3)),
          url("https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1600")
            center/cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: var(--pure-white);
        text-align: center;
        padding: 0 20px;
      }
      .branch-hero h1 {
        font-size: clamp(2.5rem, 10vw, 5.5rem);
        font-weight: 900;
        letter-spacing: -1px;
        line-height: 1.1;
      }
      .branch-badge {
        background: var(--point-green);
        padding: 4px 15px;
        border-radius: 50px;
        font-weight: 800;
        font-size: 0.8rem;
        margin-bottom: 15px;
      }

      /* --- Section Common --- */
      section {
        padding: 80px 5%; /* 모바일 여백 축소 */
      }

      /* --- Gallery Grid (핵심 수정) --- */
      .activity-gallery {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 모바일 기본 2열 */
        gap: 10px;
        margin-bottom: 40px;
      }
      .gallery-item {
        border-radius: 15px;
        overflow: hidden;
        aspect-ratio: 1 / 1; /* 정사각형 유지 */
      }
      .gallery-item.large {
        grid-column: span 2;
        grid-row: span 2;
      }
      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: var(--transition);
      }

      /* --- Video Container --- */
      .video-container {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(45, 106, 79, 0.15);
      }
      .play-btn {
        width: 60px; /* 모바일 버튼 크기 축소 */
        height: 60px;
        background: var(--point-green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(82, 183, 136, 0.5);
      }

      /* --- Coaches --- */
      .coach-section {
        background: var(--mint-light);
        border-radius: 30px 30px 0 0;
      }
      .coach-grid {
        display: grid;
        grid-template-columns: 1fr; /* 모바일 세로 1열 */
        gap: 20px;
      }
      .coach-card {
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(45, 106, 79, 0.1);
      }
      .coach-card h3 {
        font-size: 1.5rem;
        color: var(--brand-green);
        margin: 5px 0;
      }

      /* --- Button --- */
      .btn-reserve {
        background: var(--brand-green);
        color: #fff;
        padding: 10px 20px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 800;
        font-size: 0.85rem;
        transition: var(--transition);
      }

      /* --- PC Version Overrides --- */
      @media (min-width: 992px) {
        section {
          padding: 120px 10%;
        }
        header {
          height: 80px;
        }
        .logo-img {
          height: 50px;
        }
        .activity-gallery {
          grid-template-columns: repeat(4, 1fr);
          gap: 15px;
        }
        .coach-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .play-btn {
          width: 90px;
          height: 90px;
        }
        .branch-hero {
          height: 75vh;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <img
          src="resource/image/logo.png"
          alt="시흥 본점 로고"
          class="logo-img"
        />
      </a>
      <nav>
        <a href="booking-yeongjong.html" class="btn-reserve">예약하기</a>
      </nav>
    </header>

    <div class="branch-hero">
      <div class="branch-badge" data-aos="fade-down">SIHEUNG HEADQUARTERS</div>
      <h1 data-aos="fade-up">GREEN<br />GROUND</h1>
      <p
        data-aos="fade-up"
        data-aos-delay="200"
        style="font-size: clamp(1rem, 4vw, 1.3rem); margin-top: 10px"
      >
        영종의 에너지가 시작된 곳,<br />시흥 본점의 프리미엄 교육
      </p>
    </div>

    <section id="activity">
      <div style="text-align: center; margin-bottom: 50px">
        <span
          style="
            color: var(--point-green);
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 0.9rem;
          "
          >GALLERY</span
        >
        <h2 style="font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900">
          성장의 순간들
        </h2>
      </div>

      <div class="activity-gallery">
        <div class="gallery-item large" data-aos="zoom-in">
          <img
            src="https://images.unsplash.com/photo-1551958219-acbc608c6377?q=80&w=1000"
          />
        </div>
        <div class="gallery-item" data-aos="fade-up">
          <img
            src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?q=80&w=600"
          />
        </div>
        <div class="gallery-item" data-aos="fade-up" data-aos-delay="100">
          <img
            src="https://images.unsplash.com/photo-1543326727-cf6c39e8f84c?q=80&w=600"
          />
        </div>
        <div class="gallery-item large" data-aos="fade-up">
          <img
            src="https://images.unsplash.com/photo-1575361204480-aadea25e6e68?q=80&w=1000"
          />
        </div>
      </div>

      <div class="video-container" data-aos="fade-up">
        <div
          class="video-overlay"
          style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
          "
        >
          <div class="play-btn">
            <i
              class="fas fa-play"
              style="color: #fff; font-size: 1.2rem; margin-left: 3px"
            ></i>
          </div>
        </div>
        <video
          id="branch-video"
          style="width: 100%; display: block"
          poster="https://images.unsplash.com/photo-1526232761682-d26e03ac148e?q=80&w=1200"
        >
          <source
            src="https://assets.mixkit.co/videos/preview/mixkit-playing-soccer-in-the-stadium-14250-large.mp4"
            type="video/mp4"
          />
        </video>
      </div>
    </section>

    <section id="coaches" class="coach-section">
      <h2
        style="
          text-align: center;
          font-size: clamp(1.5rem, 5vw, 2.8rem);
          margin-bottom: 40px;
        "
        data-aos="fade-up"
      >
        PROFESSIONAL COACHES
      </h2>
      <div class="coach-grid">
        <div class="coach-card" data-aos="fade-up">
          <span
            style="
              color: var(--point-green);
              font-weight: 800;
              font-size: 0.8rem;
            "
            >DIRECTOR</span
          >
          <h3>김민수</h3>
          <p style="font-size: 0.95rem; opacity: 0.8">
            전 국가대표 유스 출신<br />AFC A License 지도자
          </p>
        </div>
        <div class="coach-card" data-aos="fade-up" data-aos-delay="100">
          <span
            style="
              color: var(--point-green);
              font-weight: 800;
              font-size: 0.8rem;
            "
            >ELITE COACH</span
          >
          <h3>이승우</h3>
          <p style="font-size: 0.95rem; opacity: 0.8">
            독일 분데스리가 유스 연수<br />유소년 전문 피지컬 트레이너
          </p>
        </div>
      </div>
    </section>

    <footer
      style="
        padding: 60px 5%;
        background: var(--brand-green);
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
      "
    >
      <p style="font-size: 0.8rem">
        &copy; 2026 GREEN GROUND SIHEUNG.<br />ALL RIGHTS RESERVED.
      </p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });
      const playBtn = document.querySelector(".play-btn");
      const video = document.getElementById("branch-video");
      playBtn.onclick = () => {
        video.play();
        document.querySelector(".video-overlay").style.display = "none";
        video.setAttribute("controls", "controls");
      };
    </script>
  </body>
</html>
