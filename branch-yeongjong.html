<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ground Corporation | 시흥 본점</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
      /* --- 영종도 로고 기반 에메랄드 & 민트 테마 --- */
      :root {
        --brand-green: #2d6a4f; /* 로고의 메인 그린 */
        --point-green: #52b788; /* 로고의 밝은 포인트 그린 */
        --mint-light: #d8f3dc; /* 배경용 연한 민트 */
        --deep-black: #1b4332; /* 텍스트용 짙은 그린 블랙 */
        --pure-white: #ffffff;
        --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background: var(--pure-white);
        color: var(--deep-black);
        line-height: 1.6;
      }

      /* --- 헤더 (영종도 스타일로 밝게 수정) --- */
      header {
        position: fixed;
        top: 0;
        width: 100%;
        height: 80px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 5%;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--mint-light);
      }
      .logo-img {
        height: 50px;
      }

      /* --- 히어로 섹션 (그린 그라디언트 적용) --- */
      .branch-hero {
        height: 75vh;
        background:
          linear-gradient(rgba(45, 106, 79, 0.7), rgba(45, 106, 79, 0.3)),
          url("https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1600")
            center/cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: var(--pure-white);
        text-align: center;
      }
      .branch-hero h1 {
        font-size: clamp(3rem, 8vw, 5.5rem);
        font-weight: 900;
        letter-spacing: -2px;
      }
      .branch-badge {
        background: var(--point-green);
        padding: 6px 22px;
        border-radius: 50px;
        font-weight: 800;
        font-size: 0.9rem;
        margin-bottom: 20px;
      }

      section {
        padding: 120px 10%;
      }

      /* --- 소개 섹션 (에메랄드 포인트) --- */
      .intro-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
      }
      .intro-text h2 {
        font-size: 3.2rem;
        line-height: 1.2;
        margin-bottom: 30px;
        font-weight: 900;
      }
      .spec-item {
        border-left: 4px solid var(--point-green);
        padding-left: 15px;
      }
      .spec-item strong {
        color: var(--brand-green);
        font-size: 1.1rem;
      }

      /* --- 코치진 섹션 (밝은 민트 배경으로 교체) --- */
      .coach-section {
        background: var(--mint-light);
        border-radius: 50px 50px 0 0;
      }
      .coach-card {
        background: #fff;
        padding: 45px;
        border-radius: 25px;
        transition: var(--transition);
        border: 1px solid rgba(45, 106, 79, 0.1);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
      }
      .coach-card:hover {
        transform: translateY(-15px);
        border-color: var(--point-green);
      }
      .coach-card h3 {
        color: var(--brand-green);
        font-size: 1.9rem;
        margin: 10px 0;
      }

      /* --- 갤러리 & 영상 --- */
      .gallery-item {
        border-radius: 20px;
        overflow: hidden;
      }
      .gallery-item img {
        transition: 0.5s;
      }
      .gallery-item:hover img {
        transform: scale(1.08);
      }
      .play-btn {
        background: var(--point-green) !important;
        box-shadow: 0 0 30px rgba(82, 183, 136, 0.5);
      }

      /* --- 버튼 스타일 --- */
      .btn-reserve {
        background: var(--brand-green);
        color: #fff;
        padding: 16px 45px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 800;
        display: inline-block;
        transition: var(--transition);
      }
      .btn-reserve:hover {
        background: var(--point-green);
        transform: translateY(-3px);
      }

      @media (max-width: 992px) {
        .intro-grid {
          grid-template-columns: 1fr;
        }
        section {
          padding: 80px 5%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <img
          src="resource/image/logo.png"
          alt="시흥 본점 로고"
          class="logo-img"
        />
      </a>
      <nav>
        <a
          href="booking-yeongjong.html"
          class="btn-reserve"
          style="padding: 10px 25px; font-size: 0.9rem"
          >예약하기</a
        >
      </nav>
    </header>

    <div class="branch-hero">
      <div class="branch-badge" data-aos="fade-down">SIHEUNG HEADQUARTERS</div>
      <h1 data-aos="fade-up">GREEN<br />GROUND</h1>
      <p data-aos="fade-up" data-aos-delay="200" style="font-size: 1.3rem">
        영종의 에너지가 시작된 곳, 시흥 본점의 프리미엄 교육
      </p>
    </div>

    <section id="activity" style="background: #fff">
      <div style="text-align: center; margin-bottom: 70px">
        <span
          style="
            color: var(--point-green);
            font-weight: 800;
            letter-spacing: 2px;
          "
          >GALLERY</span
        >
        <h2 style="font-size: 3rem; font-weight: 900">성장의 순간들</h2>
      </div>

      <div
        class="activity-gallery"
        style="
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 15px;
          margin-bottom: 60px;
        "
      >
        <div
          class="gallery-item"
          style="grid-column: span 2; grid-row: span 2"
          data-aos="zoom-in"
        >
          <img
            src="https://images.unsplash.com/photo-1551958219-acbc608c6377?q=80&w=1000"
            style="width: 100%; height: 100%; object-fit: cover"
          />
        </div>
        <div class="gallery-item" data-aos="fade-left">
          <img
            src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?q=80&w=600"
            style="width: 100%; height: 100%; object-fit: cover"
          />
        </div>
        <div class="gallery-item" data-aos="fade-left" data-aos-delay="100">
          <img
            src="https://images.unsplash.com/photo-1543326727-cf6c39e8f84c?q=80&w=600"
            style="width: 100%; height: 100%; object-fit: cover"
          />
        </div>
        <div
          class="gallery-item"
          style="grid-column: span 2"
          data-aos="fade-up"
        >
          <img
            src="https://images.unsplash.com/photo-1575361204480-aadea25e6e68?q=80&w=1000"
            style="width: 100%; height: 100%; object-fit: cover"
          />
        </div>
      </div>

      <div
        class="video-container"
        style="
          position: relative;
          border-radius: 30px;
          overflow: hidden;
          box-shadow: 0 30px 60px rgba(45, 106, 79, 0.15);
        "
        data-aos="fade-up"
      >
        <div
          class="video-overlay"
          style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
          "
        >
          <div
            class="play-btn"
            style="
              width: 90px;
              height: 90px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              cursor: pointer;
            "
          >
            <i
              class="fas fa-play"
              style="color: #fff; font-size: 1.8rem; margin-left: 5px"
            ></i>
          </div>
        </div>
        <video
          id="branch-video"
          style="width: 100%; display: block"
          poster="https://images.unsplash.com/photo-1526232761682-d26e03ac148e?q=80&w=1200"
        >
          <source
            src="https://assets.mixkit.co/videos/preview/mixkit-playing-soccer-in-the-stadium-14250-large.mp4"
            type="video/mp4"
          />
        </video>
      </div>
    </section>

    <section id="coaches" class="coach-section">
      <h2
        style="text-align: center; font-size: 2.8rem; margin-bottom: 60px"
        data-aos="fade-up"
      >
        PROFESSIONAL COACHES
      </h2>
      <div
        class="coach-grid"
        style="
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
          gap: 30px;
        "
      >
        <div class="coach-card" data-aos="fade-up">
          <span style="color: var(--point-green); font-weight: 800"
            >DIRECTOR</span
          >
          <h3>김민수</h3>
          <p>전 국가대표 유스 출신<br />AFC A License 지도자</p>
        </div>
        <div class="coach-card" data-aos="fade-up" data-aos-delay="100">
          <span style="color: var(--point-green); font-weight: 800"
            >ELITE COACH</span
          >
          <h3>이승우</h3>
          <p>독일 분데스리가 유스 연수<br />유소년 전문 피지컬 트레이너</p>
        </div>
      </div>
    </section>

    <footer
      style="
        padding: 80px 5%;
        background: var(--brand-green);
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
      "
    >
      <img
        src="image_d819b3.jpg"
        style="
          height: 45px;
          margin-bottom: 25px;
          filter: brightness(0) invert(1) opacity(0.8);
        "
      />
      <p>&copy; 2026 GREEN GROUND SIHEUNG. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });
      const playBtn = document.querySelector(".play-btn");
      const video = document.getElementById("branch-video");
      playBtn.onclick = () => {
        video.play();
        document.querySelector(".video-overlay").style.display = "none";
        video.setAttribute("controls", "controls");
      };
    </script>
  </body>
</html>
